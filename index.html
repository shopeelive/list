<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="shell">
        <header class="mast">
            <div class="mast-row">
                <div class="mast-title">Link List</div>
                <div class="mast-side">louie</div>
            </div>
        </header>

        <nav class="nav">
            <button type="button" class="nav-tab active" data-tab="upload">Links</button>
            <button type="button" class="nav-tab" data-tab="links">Files</button>
        </nav>

        <main class="main">
            <section class="pane" data-pane="upload">
                <div class="panel">
                    <div class="panel-head">Post</div>

                    <div class="composer">
                        <textarea id="quoteInput" placeholder="Insert Link or Any Text..."></textarea>

                        <div class="post-row">
                            <button type="button" id="quoteForm2" class="btn">Code</button>
                            <button type="button" id="quoteForm" class="btn btn-main">Post</button>
                        </div>
                    </div>

                    <div class="panel-head panel-head-lite">Shortcuts</div>

                    <div class="link-grid" id="listlink">
                        <a href="https://shopee.ph/shopee-stream" target="_blank">DASH IMIXX</a>
                        <a href="https://shopee.ph/andrei14388" target="_blank">LOUIE</a>
                    </div>

                    <div class="panel-head panel-head-lite">Feed</div>
                    <ul id="quoteList" class="feed"></ul>
                </div>
            </section>

            <section class="pane" data-pane="links" hidden>
                <div class="panel">
                    <div class="panel-head">Files</div>

                    <div class="upload-box">
                        <input type="file" id="fileInput" class="file-input" multiple>
                        <button type="button" id="fileUploadForm" class="btn btn-main">Upload</button>
                    </div>

                    <div id="progressContainer" class="prog-wrap">
                        <div id="uploadProgress" class="prog-text"></div>
                    </div>

                    <div id="fileList" class="file-list"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.3.3/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.3.3/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
